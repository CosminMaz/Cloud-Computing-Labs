spring.application.name=dgaspc-portal

# Cloud SQL config (uses socket factory for GCP, overridable for local dev)
spring.datasource.url=jdbc:postgresql:///${DB_NAME:dgaspc_portal}?cloudSqlInstance=${CLOUD_SQL_INSTANCE:dgaspc-iasi-portal:europe-west1:dgaspc-db}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
# For local dev without Cloud SQL, override with standard JDBC:
# spring.datasource.url=jdbc:postgresql://localhost:5432/dgaspc_portal

gcp.project-id=${GCP_PROJECT_ID:dgaspc-iasi-portal}
gcp.storage.bucket-name=${GCS_BUCKET_NAME:dgaspc-iasi-docs}
gcp.pubsub.topic-id=${PUBSUB_TOPIC_ID:status-updates}

cors.allowed-origins=http://localhost:3000,https://${APP_ENGINE_DOMAIN:dgaspc-iasi.appspot.com}

server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

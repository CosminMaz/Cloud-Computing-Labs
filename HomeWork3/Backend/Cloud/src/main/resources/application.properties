spring.application.name=dgaspc-portal
spring.config.import=optional:file:../../.env[.properties]

# Cloud SQL config (uses socket factory for GCP, overridable for local dev)
spring.datasource.url=jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

gcp.project-id=${GCP_PROJECT_ID}
gcp.storage.bucket-name=${GCS_BUCKET_NAME}
gcp.pubsub.topic-id=${PUBSUB_TOPIC_ID}

cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://${APP_ENGINE_DOMAIN}

server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

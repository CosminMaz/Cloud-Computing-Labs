services:

  postgres:
    image: postgres:16-alpine
    container_name: winamp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: winamp
      POSTGRES_USER: winamp
      POSTGRES_PASSWORD: winamp_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winamp -d winamp"]
      interval: 5s
      timeout: 5s
      retries: 10

  gingo:
    build: ./backend/gingo
    container_name: winamp-gingo
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://winamp:winamp_secret@postgres:5432/winamp?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  gingo:
    build: ./backend/gingo
    restart: unless-stopped
    environment:
      DATABASE_URL: ${GINGO_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

  javanilla:
    build: ./backend/javanilla
    restart: unless-stopped
    environment:
      DATABASE_URL: ${JAVANILLA_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

  third-service:
    build: ./backend/recommender
    restart: unless-stopped
    environment:
      DATABASE_URL: ${RECOMMENDER_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy

  middleware:
    build: ./backend/middleware
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      GO_SERVICE_URL: ${GO_SERVICE_URL}
      JAVA_SERVICE_URL: ${JAVA_SERVICE_URL}
      THIRD_SERVICE_URL: ${THIRD_SERVICE_URL}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      gingo:
        condition: service_started
      javanilla:
        condition: service_started
      third-service:
        condition: service_started

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - middleware

volumes:
  postgres_data:
